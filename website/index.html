<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Distance Calculator</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --bg-card: #ffffff;
            --bg-input: #ffffff;
            --bg-suggestion: #ffffff;
            --bg-suggestion-hover: #f0f4ff;
            --bg-result: #f0f4ff;
            --bg-selected: #e8f5e9;
            --text: #1a1a2e;
            --text-secondary: #555;
            --text-muted: #888;
            --border: #ddd;
            --accent: #5a67d8;
            --accent-hover: #4c51bf;
            --accent-light: rgba(90,103,216,0.1);
            --shadow: rgba(0,0,0,0.08);
            --shadow-heavy: rgba(0,0,0,0.15);
            --badge-bg: #eef;
            --badge-text: #444;
            --error-bg: #fff5f5; --error-border: #fc8181; --error-text: #c53030;
            --warn-bg: #fffaf0;  --warn-border: #f6ad55;  --warn-text: #c05621;
        }
        [data-theme="dark"] {
            --bg: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-input: #25253e;
            --bg-suggestion: #25253e;
            --bg-suggestion-hover: #30304a;
            --bg-result: #25253e;
            --bg-selected: #1a3a2a;
            --text: #e2e8f0;
            --text-secondary: #a0aec0;
            --text-muted: #718096;
            --border: #2d3748;
            --accent: #7f8cf5;
            --accent-hover: #6b7cf5;
            --accent-light: rgba(127,140,245,0.15);
            --shadow: rgba(0,0,0,0.3);
            --shadow-heavy: rgba(0,0,0,0.5);
            --badge-bg: #2d2d50;
            --badge-text: #a0aec0;
            --error-bg: #2d1515; --error-border: #c53030; --error-text: #fc8181;
            --warn-bg: #2d2515;  --warn-border: #c05621;  --warn-text: #f6ad55;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
            transition: background .3s, color .3s;
        }
        .container {
            background: var(--bg-card); border-radius: 16px;
            box-shadow: 0 4px 24px var(--shadow);
            padding: 32px; max-width: 520px; width: 100%;
            transition: background .3s;
        }

        /* Top bar */
        .topbar { display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin-bottom: 24px; }
        .lang-wrapper { position: relative; }
        .topbar-btn {
            display: flex; align-items: center; gap: 5px;
            padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px;
            background: var(--bg-input); color: var(--text-secondary);
            font-size: 13px; cursor: pointer; transition: all .2s; position: relative;
        }
        .topbar-btn:hover { border-color: var(--accent); color: var(--accent); }
        .topbar-btn:disabled { opacity: .4; cursor: not-allowed; }
        .topbar-btn .chevron { font-size: 9px; opacity: .5; }

        /* Title */
        .title { text-align: center; margin-bottom: 28px; }
        .title h1 { font-size: 22px; font-weight: 700; color: var(--text); }
        .title p  { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

        /* Language dropdown */
        .lang-wrapper { position: relative; display: inline-block; }
        .lang-dropdown {
            display: none; 
            position: absolute; 
            top: 100%; 
            left: 0;
            margin-top: 4px;
            min-width: 200px; 
            max-width: 280px;
            background: var(--bg-card); 
            border: 1px solid var(--border);
            border-radius: 8px; 
            box-shadow: 0 8px 24px var(--shadow-heavy);
            z-index: 9999; 
            max-height: 300px; 
            overflow-y: auto;
        }
        .lang-dropdown.open { display: block; }
        .lang-option {
            display: flex; 
            align-items: center; 
            gap: 8px;
            padding: 10px 14px; 
            font-size: 13px; 
            color: var(--text);
            cursor: pointer; 
            border-bottom: 1px solid var(--border); 
            transition: background .15s;
            white-space: nowrap;
        }
        .lang-option:last-child { border-bottom: none; }
        .lang-option:hover { background: var(--bg-suggestion-hover); }
        .lang-option.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
        .lang-flag { font-size: 16px; line-height: 1; font-family: "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif; flex-shrink: 0; }
        .lang-status { 
            padding: 12px 16px; 
            font-size: 13px; 
            color: var(--text-muted); 
            text-align: center;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lang-status.error { color: var(--error-text); }

        /* Search box */
        .search-box {
            border: 1px solid var(--border); border-radius: 12px;
            padding: 20px; margin-bottom: 16px;
            background: var(--bg-input); transition: background .3s, border .3s;
        }
        .input-group { position: relative; margin-bottom: 16px; }
        .input-group:last-child { margin-bottom: 0; }
        .input-group label {
            display: block; font-size: 12px; font-weight: 600;
            text-transform: uppercase; letter-spacing: .5px;
            color: var(--text-muted); margin-bottom: 6px;
        }
        .input-group input {
            width: 100%; padding: 10px 14px;
            border: 1px solid var(--border); border-radius: 8px;
            font-size: 15px; background: var(--bg-card); color: var(--text);
            transition: border .2s, box-shadow .2s;
        }
        .input-group input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
        .input-group input::placeholder { color: var(--text-muted); }
        .separator { text-align: center; color: var(--text-muted); font-size: 18px; margin: 12px 0; user-select: none; }

        /* Suggestions */
        .suggestions {
            position: absolute; top: 100%; left: 0; right: 0;
            background: var(--bg-suggestion); border: 1px solid var(--accent);
            border-top: none; border-radius: 0 0 8px 8px;
            max-height: 240px; overflow-y: auto; z-index: 1000;
            display: none; box-shadow: 0 4px 12px var(--shadow-heavy);
        }
        .suggestions.active { display: block; }
        .suggestion-item {
            padding: 10px 14px; cursor: pointer;
            border-bottom: 1px solid var(--border); transition: background .15s;
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover, .suggestion-item.kbd-selected { background: var(--bg-suggestion-hover); }
        .suggestion-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: var(--bg);
        }
        .suggestion-item.disabled:hover { background: var(--bg); }
        .city-name { font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; font-size: 14px; margin-bottom: 2px; }
        .city-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 4px; flex-wrap: wrap; }
        .badge { background: var(--badge-bg); color: var(--badge-text); padding: 1px 6px; border-radius: 3px; font-size: 11px; }
        .flag { font-size: 16px; line-height: 1; font-family: "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif; }

        /* Selected city chip */
        .selected-city { display: none; margin-top: 6px; padding: 6px 10px; background: var(--bg-selected); border-radius: 6px; font-size: 12px; color: var(--text-secondary); }
        .selected-city.show { display: flex; align-items: center; gap: 6px; }

        /* Calc button */
        .calc-btn {
            width: 100%; padding: 12px; background: var(--accent); color: #fff;
            border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: background .2s, transform .1s;
        }
        .calc-btn:hover:not(:disabled) { background: var(--accent-hover); transform: translateY(-1px); }
        .calc-btn:active:not(:disabled) { transform: translateY(0); }
        .calc-btn:disabled { opacity: .5; cursor: not-allowed; }

        /* Result */
        .result { margin-top: 16px; padding: 20px; background: var(--bg-result); border-radius: 10px; text-align: center; display: none; }
        .result.show { display: block; animation: fadeIn .3s ease-out; }
        .result-cities { font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
        .result-distance { font-size: 28px; font-weight: 700; color: var(--accent); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        /* Messages */
        .msg { border-radius: 8px; margin-top: 12px; padding: 10px 14px; font-size: 13px; display: none; }
        .msg.show { display: block; }
        .msg-warn  { background: var(--warn-bg);  border: 1px solid var(--warn-border);  color: var(--warn-text); }
        .msg-error { background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error-text); }
        .msg-detail { margin-top: 4px; font-size: 11px; opacity: .7; font-family: monospace; }
        .loading { display: none; text-align: center; color: var(--accent); margin-top: 12px; font-size: 13px; }
        .loading.show { display: block; }
    </style>
</head>
<body>
<div class="container">
    <div class="topbar">
        <div class="lang-wrapper">
            <button class="topbar-btn" id="langBtn" aria-label="Select language">
                <span class="lang-flag" id="langBtnFlag"></span>
                <span id="langBtnLabel">Language</span>
                <span class="chevron">&#9662;</span>
            </button>
            <div class="lang-dropdown" id="langDropdown"></div>
        </div>
        <button class="topbar-btn" id="themeBtn" aria-label="Toggle dark mode">
            <span id="themeIcon">&#9790;</span>
        </button>
    </div>

    <div class="title">
        <h1>City Distance Calculator</h1>
        <p>Find the distance between any two cities</p>
    </div>

    <div class="search-box">
        <div class="input-group">
            <label for="city1">From</label>
            <input type="text" id="city1" placeholder="Search for a city..." autocomplete="off">
            <div class="suggestions" id="suggestions1"></div>
            <div class="selected-city" id="selected1"></div>
        </div>
        <div class="separator">&#8597;</div>
        <div class="input-group">
            <label for="city2">To</label>
            <input type="text" id="city2" placeholder="Search for a city..." autocomplete="off">
            <div class="suggestions" id="suggestions2"></div>
            <div class="selected-city" id="selected2"></div>
        </div>
    </div>

    <button class="calc-btn" id="searchBtn" disabled>Calculate Distance</button>

    <div class="loading" id="loading">Calculating...</div>
    <div class="msg msg-warn" id="msgValidation"></div>
    <div class="msg msg-error" id="msgServer">
        <span id="msgServerText"></span>
        <div class="msg-detail" id="msgServerDetail"></div>
    </div>
    <div class="result" id="result">
        <div class="result-cities" id="resultCities"></div>
        <div class="result-distance" id="resultDistance"></div>
    </div>
</div>

<!-- CDS Client from npm (IIFE build -> window.CDS) -->
<script src="https://cdn.jsdelivr.net/npm/@xfilipnamefilip/cds-client@latest/dist/index.global.js"></script>

<script>
(function () {
    // ── Check if CDS loaded correctly ─────────────────────────────────────────
    if (typeof CDS === 'undefined' || !CDS.CDSClient) {
        console.error('CDS library failed to load from CDN');
        // Still initialize UI but show error state
        document.body.innerHTML = '<div style="padding:20px;text-align:center;"><h1>Failed to load required libraries</h1><p>Please check your internet connection and refresh the page.</p></div>';
        return;
    }
    
    // ── Init client from npm package ──────────────────────────────────────────
    var client = new CDS.CDSClient({
        baseURL:  '__API_BASE__',
        username: '__AUTH_USERNAME__',
        password: '__AUTH_PASSWORD__'
    });
    var toFlag = CDS.FlagUtils.toFlagEmoji;
    var fmtPop = CDS.FormatUtils.fmtPop;

    // ── Cookies ───────────────────────────────────────────────────────────────
    function setCookie(n,v,d){ var e=new Date();e.setTime(e.getTime()+d*864e5);document.cookie=n+'='+encodeURIComponent(v)+';expires='+e.toUTCString()+';path=/;SameSite=Lax'; }
    function getCookie(n){ var m=document.cookie.match('(^|;)\\s*'+n+'=([^;]*)');return m?decodeURIComponent(m[2]):null; }

    // ── Theme ─────────────────────────────────────────────────────────────────
    function applyTheme(t){
        document.documentElement.setAttribute('data-theme',t);
        document.getElementById('themeIcon').textContent = t==='dark'?'\u2600':'\u263E';
        setCookie('cds_theme',t,365);
    }
    (function(){
        var s=getCookie('cds_theme');
        if(s){applyTheme(s);return;}
        if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches) applyTheme('dark');
    })();
    document.getElementById('themeBtn').addEventListener('click',function(){
        applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
    });

    // ── State ─────────────────────────────────────────────────────────────────
    var sel={city1:null,city2:null}, timers={};
    function updateBtn(){
        var c1=sel.city1,c2=sel.city2;
        var btn=document.getElementById('searchBtn');
        // Button enabled only if both cities selected AND they're different
        btn.disabled=!(c1&&c2&&c1.id!==c2.id);
    }
    function canCalculate(){
        var c1=sel.city1,c2=sel.city2;
        if(!c1||!c2){
            return {ok:false,msg:'Please select both cities from the suggestions.'};
        }
        if(c1.id===c2.id){
            return {ok:false,msg:'Cannot calculate distance between the same city. Please select two different cities.'};
        }
        return {ok:true};
    }

    // ── Messages ──────────────────────────────────────────────────────────────
    function clr(){['msgValidation','msgServer','result'].forEach(function(id){document.getElementById(id).classList.remove('show');});}
    function warn(m){var e=document.getElementById('msgValidation');e.textContent=m;e.classList.add('show');}
    function err(m,d){document.getElementById('msgServerText').textContent=m;document.getElementById('msgServerDetail').textContent=d||'';document.getElementById('msgServer').classList.add('show');}

    // ── Language ──────────────────────────────────────────────────────────────
    var langsData = [];
    var langsLoaded = false;
    var langsError = null;
    var langsRetryCount = 0;
    var MAX_RETRIES = 3;
    var RETRY_DELAY = 2000; // 2 seconds
    
    function closeLang(){document.getElementById('langDropdown').classList.remove('open');}
    function chooseLang(l){
        if(!l) return;
        client.setLanguage(l.code);
        // Use the flag emoji directly from API, or convert countryCode to flag
        var flag = l.flag || toFlag(l.countryCode) || '🏳️';
        var name = l.name || l.code;
        console.log('Setting language button:', { code: l.code, flag: flag, name: name, rawFlag: l.flag, countryCode: l.countryCode });
        document.getElementById('langBtnFlag').textContent = flag;
        document.getElementById('langBtnLabel').textContent = name;
        document.querySelectorAll('.lang-option').forEach(function(o){o.classList.toggle('active',o.dataset.code===l.code);});
        setCookie('cds_lang',l.code,365);
        closeLang();
    }
    
    function renderLangDropdown(){
        var dd=document.getElementById('langDropdown');
        if(!dd) return;
        
        if(langsError && langsRetryCount >= MAX_RETRIES){
            dd.innerHTML='<div class="lang-status error">Failed to load languages after ' + MAX_RETRIES + ' attempts</div>';
        }else if(langsError){
            dd.innerHTML='<div class="lang-status">Loading languages... (attempt ' + (langsRetryCount + 1) + '/' + MAX_RETRIES + ')</div>';
        }else if(!langsLoaded){
            dd.innerHTML='<div class="lang-status">Loading languages...</div>';
        }else if(!langsData.length){
            dd.innerHTML='<div class="lang-status">No languages available</div>';
        }else{
            dd.innerHTML='';
            console.log('Rendering language dropdown with', langsData.length, 'languages');
            langsData.forEach(function(l, index){
                console.log('Language', index, ':', { code: l.code, flag: l.flag, countryCode: l.countryCode, name: l.name });
                var o=document.createElement('div');
                o.className='lang-option';
                o.dataset.code=l.code;
                // Use the flag emoji directly from API, or convert countryCode if needed
                var flag = l.flag || toFlag(l.countryCode) || '🏳️';
                var name = l.name || l.code;
                console.log('Rendering option:', { flag: flag, name: name });
                o.innerHTML='<span class="lang-flag">'+flag+'</span><span>'+name+'</span>';
                o.addEventListener('click',function(){chooseLang(l);});
                dd.appendChild(o);
            });
        }
    }
    
    function loadLanguagesWithRetry(){
        console.log('Loading languages... (attempt ' + (langsRetryCount + 1) + ')');
        
        client.getLanguages().then(function(langs){
            console.log('Languages loaded successfully:', langs);
            langsData = Array.isArray(langs) ? langs : [];
            langsLoaded = true;
            langsError = null;
            langsRetryCount = 0;
            
            // Always refresh dropdown if open
            var dd=document.getElementById('langDropdown');
            if(dd && dd.classList.contains('open')){
                renderLangDropdown();
            }
            
            // Set default language - always check cookie and apply it
            if(langsData.length){
                var pref=getCookie('cds_lang')||(navigator.language||'').split('-')[0].toLowerCase()||'en';
                console.log('Language preference from cookie/navigator:', pref);
                var defaultLang=langsData.find(function(l){return l.code===pref;})||langsData[0];
                console.log('Selected default language:', defaultLang);
                if(defaultLang){
                    chooseLang(defaultLang);
                }
            }
        }).catch(function(e){
            console.error('Failed to load languages (attempt ' + (langsRetryCount + 1) + '):', e);
            langsError = e.message || 'Failed to load languages';
            langsLoaded = false;
            
            // Update dropdown if open
            var dd=document.getElementById('langDropdown');
            if(dd && dd.classList.contains('open')){
                renderLangDropdown();
            }
            
            // Retry if we haven't exceeded max retries
            if(langsRetryCount < MAX_RETRIES){
                langsRetryCount++;
                console.log('Retrying in ' + RETRY_DELAY + 'ms...');
                setTimeout(loadLanguagesWithRetry, RETRY_DELAY);
            }else{
                console.error('Max retries reached. Giving up.');
                langsLoaded = true; // Mark as loaded to show error state
                if(dd && dd.classList.contains('open')){
                    renderLangDropdown();
                }
            }
        });
    }
    
    // Initial load
    loadLanguagesWithRetry();
    
    document.getElementById('langBtn').addEventListener('click',function(e){
        e.stopPropagation();
        var dd=document.getElementById('langDropdown');
        var isOpen=dd.classList.contains('open');
        
        if(!isOpen){
            // Opening - always render current state
            renderLangDropdown();
        }
        
        dd.classList.toggle('open');
        
        // If failed and max retries reached, try one more time when user opens dropdown
        if(!isOpen && langsError && langsRetryCount >= MAX_RETRIES){
            langsRetryCount = 0;
            langsError = null;
            langsLoaded = false;
            loadLanguagesWithRetry();
        }
    });
    
    document.addEventListener('click',function(e){
        if(!e.target.closest('.lang-wrapper')){
            closeLang();
        }
    });
    document.getElementById('langDropdown').addEventListener('click',function(e){e.stopPropagation();});

    // ── Autocomplete ──────────────────────────────────────────────────────────
    function setupAC(iid,sid,selid,key){
        var inp=document.getElementById(iid),sug=document.getElementById(sid),chip=document.getElementById(selid),kb=-1;
        inp.addEventListener('input',function(){
            var q=inp.value.trim(); sel[key]=null; chip.classList.remove('show'); updateBtn();
            if(q.length<2){sug.classList.remove('active');return;}
            clearTimeout(timers[key]);
            timers[key]=setTimeout(function(){
                client.getSuggestions(q).then(function(cities){renderSug(cities,sug,inp,chip,key);})
                .catch(function(e){sug.classList.remove('active');clr();e.clientSide?warn(e.message):err(e.message,e.response);});
            },250);
        });
        inp.addEventListener('keydown',function(e){
            var items=sug.querySelectorAll('.suggestion-item'); if(!items.length)return;
            if(e.key==='ArrowDown'){e.preventDefault();kb=(kb+1)%items.length;}
            else if(e.key==='ArrowUp'){e.preventDefault();kb=(kb-1+items.length)%items.length;}
            else if(e.key==='Enter'&&kb>=0){e.preventDefault();items[kb].click();return;}
            else if(e.key==='Escape'){sug.classList.remove('active');kb=-1;return;}
            else return;
            items.forEach(function(it,i){it.classList.toggle('kbd-selected',i===kb);});
            if(items[kb])items[kb].scrollIntoView({block:'nearest'});
        });
        document.addEventListener('click',function(e){if(!inp.contains(e.target)&&!sug.contains(e.target)){sug.classList.remove('active');kb=-1;}});
    }
    function renderSug(cities,sug,inp,chip,key){
        sug.innerHTML='';if(!cities||!cities.length){sug.classList.remove('active');return;}
        var otherKey=key==='city1'?'city2':'city1';
        var otherCity=sel[otherKey];
        cities.forEach(function(c){
            var el=document.createElement('div');el.className='suggestion-item';
            var isAlreadySelected=otherCity&&otherCity.id===c.id;
            if(isAlreadySelected){
                el.classList.add('disabled');
                el.style.cursor='not-allowed';
            }
            var f=toFlag(c.flag||c.countryCode||''),badges='';
            if(c.country)badges+='<span class="badge">'+c.country+'</span>';
            if(c.adminRegion)badges+='<span class="badge">'+c.adminRegion+'</span>';
            if(c.population)badges+='<span class="badge">'+fmtPop(c.population)+'</span>';
            el.innerHTML='<div class="city-name">'+(f?'<span class="flag">'+f+'</span>':'')+'<span>'+c.name+'</span></div>'+(badges?'<div class="city-meta">'+badges+'</div>':'');
            el.addEventListener('click',function(){
                if(isAlreadySelected){
                    warn('This city is already selected as the '+ (key==='city1'?'destination':'origin') +'. Please select a different city.');
                    sug.classList.remove('active');
                    return;
                }
                sel[key]=c;inp.value=c.name;sug.classList.remove('active');
                chip.innerHTML='<span class="flag">'+toFlag(c.flag||c.countryCode||'')+'</span><strong>'+c.name+'</strong>'+(c.country?', '+c.country:'')+(c.adminRegion?' ('+c.adminRegion+')':'');
                chip.classList.add('show');updateBtn();
            });
            sug.appendChild(el);
        });
        sug.classList.add('active');
    }
    setupAC('city1','suggestions1','selected1','city1');
    setupAC('city2','suggestions2','selected2','city2');

    // ── Calculate ─────────────────────────────────────────────────────────────
    document.getElementById('searchBtn').addEventListener('click',function(){
        var c1=sel.city1,c2=sel.city2; clr();
        
        console.log('Calculate clicked with cities:', c1, c2);
        
        var validation=canCalculate();
        if(!validation.ok){
            warn(validation.msg);
            return;
        }
        
        var btn=this,ld=document.getElementById('loading');ld.classList.add('show');btn.disabled=true;
        
        // Debug: Show what we're sending
        var requestBody = { City1Id: c1.id, City2Id: c2.id };
        console.log('Sending request body:', JSON.stringify(requestBody));
        console.log('Calling calculateDistance with IDs:', c1.id, c2.id);
        
        // Use fetch directly for debugging
        fetch(client.baseURL + '/distance', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Basic ' + btoa('User:SecretPassword')
            },
            body: JSON.stringify(requestBody)
        }).then(function(res){
            console.log('Response status:', res.status);
            if(!res.ok){
                return res.text().then(function(text){
                    console.error('Error response:', text);
                    throw new Error('HTTP ' + res.status + ': ' + text);
                });
            }
            return res.json();
        }).then(function(data){
            console.log('Distance result:', data);
            var distance = data.distance || data.Distance || data.distanceKm || 0;
            document.getElementById('resultCities').innerHTML=
                '<span class="flag">'+toFlag(c1.flag||c1.countryCode||'')+'</span> <strong>'+c1.name+'</strong>'+(c1.country?' ('+c1.country+')':'')
                +' &harr; '
                +'<span class="flag">'+toFlag(c2.flag||c2.countryCode||'')+'</span> <strong>'+c2.name+'</strong>'+(c2.country?' ('+c2.country+')':'');
            document.getElementById('resultDistance').textContent=Number(distance).toLocaleString(undefined,{maximumFractionDigits:2})+' km';
            document.getElementById('result').classList.add('show');
        }).catch(function(e){
            console.error('Calculate error:', e);
            err('Failed to calculate distance: ' + e.message);
        }).finally(function(){ld.classList.remove('show');updateBtn();});
    });
})();
</script>
</body>
</html>
