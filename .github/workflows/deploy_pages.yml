name: Test and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out the repository
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: bun install

    - name: Build the package
      run: bun run build

    - name: Install Playwright Browsers
      run: npx playwright install chromium firefox

    # Tests use Playwright page.route() mocks — no real backend required.
    # The webServer (scripts/test-server.js) serves the static HTML; all
    # API calls (/languages, /suggestions, /distance) are intercepted and
    # fulfilled with fixture data directly inside the test suite.
    - name: Run Playwright tests
      run: npx playwright test
      env:
        CI: true
        TEST_BASE_URL: http://localhost:3000
        CDS_AUTH_USERNAME: admin
        CDS_AUTH_PASSWORD: password

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: |
          playwright-report/
          test-results/
        retention-days: 30

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Check out the repository
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies and build
      run: |
        bun install
        bun run build

    - name: Inject environment variables
      run: |
        echo "Injecting secrets into website..."
        sed -i 's|__API_BASE__|'${{ secrets.API_BASE }}'|g' website/index.html
        sed -i 's|__AUTH_USERNAME__|'${{ secrets.AUTH_USERNAME }}'|g' website/index.html
        sed -i 's|__AUTH_PASSWORD__|'${{ secrets.AUTH_PASSWORD }}'|g' website/index.html

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        personal_token: ${{ secrets.PAT }}
        publish_dir: ./website
        commit_message: "Deploy to GitHub Pages [skip ci]"
