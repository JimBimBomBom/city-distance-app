services:
  cds-backend:
    image: jimbimdocker/city-distance-service:0.3.4
    container_name: cds-test-backend
    ports:
      - "8080:8080"
    env_file: 
      - path: "DefaultAppEnv.env"
        required: true
    volumes:
      - ./tests/fixtures:/app/fixtures:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health_check"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - cds-network
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: cds_mysql_db
    env_file:
      - path: "DefaultDatabaseEnv.env"
        required: true
    environment:
      - MYSQL_ROOT_PASSWORD=password123
      # - MYSQL_DATABASE=cds_db
    networks:
      - cds-network
    volumes:
      - ./MySQLInit.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: elasticsearch
    environment:
      - node.name=elasticsearch
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - cluster.routing.allocation.disk.threshold_enabled=false
      - ingest.geoip.downloader.enabled=false
      - http.host=0.0.0.0
    mem_limit: 2g
    ports:
      - "9200:9200"
    networks:
      - cds-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

networks:
  cds-network:
    driver: bridge
