services:
  cds-backend:
    image: jimbimdocker/city-distance-service:0.3.4
    container_name: cds-test-backend
    ports:
      - "8080:8080"
    env_file: 
      - path: "DefaultAppEnv.env"
        required: true
    volumes:
      - ./tests/fixtures:/app/fixtures:ro
      - ./Resources:/app/Resources:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health_check"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - cds-network
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  db:
    image: mysql:latest
    container_name: cds_mysql_db
    env_file:
      - path: "DefaultDatabaseEnv.env"
        required: true
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-changeme}
    networks:
      - cds-network
    volumes:
      - ./data/mysql:/var/lib/mysql
      - type: bind
        source: ./mysql-custom.cnf
        target: /etc/mysql/conf.d/custom.cnf
        read_only: true
    command: >
      mysqld 
      --require_secure_transport=OFF
      --caching_sha2_password_auto_generate_rsa_keys=OFF
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-changeme}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: elasticsearch
    environment:
      - node.name=elasticsearch
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - cluster.routing.allocation.disk.threshold_enabled=false
      - ingest.geoip.downloader.enabled=false
      - http.host=0.0.0.0
    mem_limit: 2g
    ports:
      - "9200:9200"
    networks:
      - cds-network
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

networks:
  cds-network:
    driver: bridge
