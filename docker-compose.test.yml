version: '3.8'

services:
  cds-backend:
    image: jimbimdocker/city-distance-service:0.3.4
    container_name: cds-test-backend
    ports:
      - "8080:8080"
    env_file: 
      - path: "DefaultAppEnv.env"
        required: true
    volumes:
      - ./tests/fixtures:/app/fixtures:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health_check"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - cds-network
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  db:
    image: mysql:latest
    container_name: cds_mysql_db
    env_file:
      - path: "DefaultDatabaseEnv.env"
        required: true
    networks:
      - cds-network
    volumes:
      - ./MySQLInit.sql:/docker-entrypoint-initdb.d/init.sql
      - ./data/mysql:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
        container_name: elasticsearch
        environment:
            - ELASTIC_PASSWORD=testPassword123
            - node.name=elasticsearch
            - discovery.type=single-node
            - bootstrap.memory_lock=true
            - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
            - xpack.security.enabled=false
            - http.max_content_length=200mb
            - http.cors.enabled=true
            - cluster.routing.allocation.disk.threshold_enabled=true
            - cluster.routing.allocation.disk.watermark.low=95%
            - cluster.routing.allocation.disk.watermark.high=97%
            - cluster.routing.allocation.disk.watermark.flood_stage=98%
        ulimits:
            memlock:
                soft: -1
                hard: -1
        volumes:
            - ./data/elasticsearch:/usr/share/elasticsearch/data
        ports:
            - "9200:9200"
        networks:
            - cds-network
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 90s

networks:
  cds-network:
    driver: bridge
